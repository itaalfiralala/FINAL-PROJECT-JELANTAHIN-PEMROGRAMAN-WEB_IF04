<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Off Minyak - JelantahIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #112039;
            color: white;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- PETA (atas/kiri) --- */
        .map-section {
            flex: 1;
            min-height: 400px;
            position: relative;
            padding: 20px;
            overflow: auto;
        }

        .map-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .map-header {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #112039;     
            padding: 15px;
            border-radius: 15px;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: #ffb703; }

        .lokasi-inputs {
            position: relative;
            z-index: 2;
            margin-top: 20px;
            max-width: 500px;
        }

        .input-lokasi {
            background: white;
            padding: 12px 15px;
            border-radius: 25px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .bulat { height: 12px; width: 12px; border-radius: 50%; margin-right: 10px; }
        .bulat-yellow { border: 2px solid #ffb703; }
        .bulat-fill { background: #ffb703; }

        .input-lokasi input {
            border: none; outline: none; width: 100%; font-size: 0.9rem; color: #333;
        }

        /* --- BAGIAN FORMULIR (BAWAH / KANAN) --- */
        .form-section {
            background-color: #112039;
            padding: 40px 25px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            margin-top: -30px;
            z-index: 10;
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1rem;
            color: #ddd;
        }

        /* untuk space box putih informasi */
        .form-group { margin-bottom: 25px; }
    
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            font-size: 0.85rem;
        }

        .input-control {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: white;
            font-size: 1rem;
            color: #333;
            display: block;
        }

        .btn-rute {
            background: #ffb703;
            color: #112039;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-rute:hover {
            background: #e0a102;
        }
        
        /* RESPONSIVE LAYOUT (UNTUK LAYAR LAPTOP/DESKTOP) */
        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; }
            .map-section { flex: 1.5; height: 100vh; }
            .form-section {
                flex: 1;
                height: 100vh;
                margin-top: 0;
                border-radius: 0;
                padding: 60px 40px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="map-section">
            <img src="./images/peta.png" alt="Peta" class="map-img">

            <div class="map-header">
                <div class="logo">JeLantahIN</div>
                <div style="cursor: pointer;" onclick="window.location.href='index.html'">🏠</div>
            </div>
            
            <div class="lokasi-inputs">
                <div class="input-lokasi">
                    <span class="bulat bulat-yellow"></span>
                    <input type="text" id="lokasiSaja" placeholder="Pilih lokasi Penjemputan">
                </div>
                <div class="input-lokasi">
                    <span class="bulat bulat-fill"></span>
                    <input type="text" id="lokasiTujuan" placeholder="Pilih lokasi Tujuan">
                </div>
            </div>
        </div>

        <div class="form-section">
            <p class="form-title">Isi detail drop off minyak Anda</p>

            <div class="form-group">
                <label for="jumlahLiter">Masukkan Jumlah Liter</label>
                <select id="jumlahLiter" class="input-control">
                    <option value="">-- Pilih Jumlah Liter --</option>
                    <option value="5">Minimal 5 liter</option>
                    <option value="5-10">5 - 10 liter</option>
                    <option value=">10">Lebih dari 10 liter</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tanggalAntar">Tanggal Pengantaran</label>
                <input type="date" id="tanggalAntar" class="input-control">
            </div>

            <div class="form-group">
                <label for="catatan">Catatan (opsional)</label>
                <input type="text" id="catatan" class="input-control" placeholder="Contoh: Titip di satpam">
            </div>

            <button class="btn-rute" onclick="keNavigasi()">RUTE</button>
        </div> 
    </div>

    <script>
        function keNavigasi() {
            const liter = document.getElementById('jumlahLiter').value;
            const tanggal = document.getElementById('tanggalAntar').value;

            // Validasi: wajib mengisi liter dan tanggal
            if (!liter || !tanggal) {
                alert("Harap isi jumlah liter dan tanggal pengantaran terlebih dahulu!");
                return;
            }

            // navigasi
            window.location.href = 'titikDropOff.html';
        }
    </script>
</body>
</html>
