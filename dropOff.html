<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Off Minyak - JelantahIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #112039;
            color: white;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- BAGIAN ATAS --- */
        .map-section {
            flex: 1;
            min-height: 400px;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('peta.png') center/cover no-repeat;
            position: relative;
            padding: 20px;
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #112039;     
            padding: 15px;
            border-radius: 15px;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: #ffb703; }

        .lokasi-inputs {
            margin-top: 20px;
            max-width: 500px;
        }

        .input-lokasi {
            background: white;
            padding: 12px 15px;
            border-radius: 25px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .bulat { height: 12px; width: 12px; border-radius: 50%; margin-right: 10px; }
        .bulat-yellow { border: 2px solid #ffb703; }
        .bulat-fill { background: #ffb703; }

        .input-lokasi input {
            border: none; outline: none; width: 100%; font-size: 0.9rem; color: #333;
        }

        /* --- BAGIAN BAWAH --- */
        .form-section {
            background-color: #112039;
            padding: 40px 25px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            margin-top: -30px;
            z-index: 10;
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1rem;
            color: #ddd;
        }

        .formdropOff-group { margin-bottom: 20px; }
    
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            font-size: 0.85rem;
        }

        .input-control {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: white;
            font-size: 1rem;
            color: #333;
            display: block;
        }

        .btn-rute {
            background: #ffb703;
            color: #112039;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        
        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; }
            .map-section { flex: 1.5; height: 100vh; }
            .form-section {
                flex: 1;
                height: 100vh;
                margin-top: 0;
                border-radius: 0;
                padding: 60px 40px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="map-section">
            <div class="map-header">
                <div class="logo">JeLantahIN</div>
                <div style="font-size: 1.5rem;">🏠</div>
            </div>

            <div class="lokasi-inputs">
                <div class="input-lokasi">
                    <span class="bulat bulat-yellow"></span>
                    <input type="text" placeholder="Pilih lokasi Penjemputan">
                </div>
                <div class="input-lokasi">
                    <span class="bulat bulat-fill"></span>
                    <input type="text" placeholder="Pilih lokasi Tujuan">
                </div>
            </div>
        </div>

        <div class="form-section">
            <p class="form-title">Isi drop off minyak Anda</p>

            <div class="field-group">
                <label>Masukkan Jumlah Liter</label>
                <select class="input-control">
                    <option>Minimal 5 liter</option>
                    <option>5 - 10 liter</option>
                    <option>Lebih dari 10 liter</option>
                </select>
            </div>

            <div class="formdropOff-group">
                <label>Tanggal Pengantaran</label>
                <input type="date" class="input-control">
            </div>

            <div class="formdropOff-group">
                <label>Catatan (opsional)</label>
                <input type="text" class="input-control" placeholder="Contoh: Titip di satpam">
            </div>
            
            <button class="btn-rute">RUTE</button>
        </div> </div>

</body>
</html>
