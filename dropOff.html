<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Off Minyak - JelantahIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #112039;
            color: white;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- PETA (atas/kiri) --- */
        .map-section {
            flex: 1;
            min-height: 400px;
            position: relative;
            padding: 20px;
            overflow: visible;
        }

        .map-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .map-header {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #112039;
            padding: 15px;
            border-radius: 15px;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: #ffb703; }

        .lokasi-inputs {
            position: relative;
            z-index: 5;
            margin-top: 20px;
            max-width: 500px;
        }

        .input-lokasi {
            background: white;
            padding: 12px 15px;
            border-radius: 25px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative;
        }

        .bulat { height: 12px; width: 12px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
        .bulat-yellow { border: 2px solid #ffb703; }
        .bulat-fill { background: #ffb703; }

        .input-lokasi input {
            border: none; outline: none; width: 100%; font-size: 0.9rem; color: #333; background: transparent;
        }

        .btn-gps {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0 0 0 8px;
            flex-shrink: 0;
        }
        .btn-gps:disabled { opacity: 0.4; cursor: wait; }

        /* --- DROPDOWN SARAN ALAMAT --- */
        .saran-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 12px;
            margin-top: 4px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
            z-index: 20;
            display: none;
        }

        .saran-list.show { display: block; }

        .saran-list li {
            padding: 10px 15px;
            color: #333;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.85rem;
        }

        .saran-list li:last-child { border-bottom: none; }
        .saran-list li:hover { background: #fff6e0; }

        .saran-list li strong { color: #112039; display: block; font-size: 0.9rem; }
        .saran-list li small { color: #777; }

        .saran-list .status-msg {
            padding: 10px 15px;
            color: #999;
            font-size: 0.8rem;
            cursor: default;
        }

        /* --- BAGIAN FORMULIR (BAWAH / KANAN) --- */
        .form-section {
            background-color: #112039;
            padding: 40px 25px;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            margin-top: -30px;
            z-index: 10;
            position: relative;
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1rem;
            color: #ddd;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .input-control {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: white;
            font-size: 1rem;
            color: #333;
            display: block;
        }

        /* --- TOMBOL RUTE --- */
        .btn-rute {
            background: #ffb703;
            color: #112039;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.15s ease, box-shadow 0.3s ease, background 0.2s;
        }


        .btn-rute:hover {
            background: #e0a102;
            transform: scale(1.02);
            box-shadow: 0 0 12px 4px rgba(255, 183, 3, 0.6);
        }

        .btn-rute:active {
            transform: scale(0.95);
            box-shadow: 0 0 6px 1px rgba(255, 183, 3, 0.6);
            animation: none;
        }

        /* RESPONSIVE LAYOUT (UNTUK LAYAR LAPTOP/DESKTOP) */
        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; }
            .map-section { flex: 1.5; height: 100vh; overflow: visible; }
            .form-section {
                flex: 1;
                height: 100vh;
                margin-top: 0;
                border-radius: 0;
                padding: 60px 40px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">

        <div class="map-section">
            <img src="./images/peta.png" alt="Peta" class="map-img">

            <div class="map-header">
                <div class="logo">JeLantahIN</div>
                <div style="cursor: pointer;" onclick="window.location.href='index.html'">🏠</div>
            </div>

            <div class="lokasi-inputs">
                <div class="input-lokasi">
                    <span class="bulat bulat-yellow"></span>
                    <input type="text" id="lokasiSaja" placeholder="Pilih lokasi Penjemputan" autocomplete="off">
                    <button type="button" class="btn-gps" id="btnGpsPenjemputan" title="Gunakan lokasi saya saat ini">📍</button>
                    <ul class="saran-list" id="saranPenjemputan"></ul>
                </div>
                <div class="input-lokasi">
                    <span class="bulat bulat-fill"></span>
                    <input type="text" id="lokasiTujuan" placeholder="Pilih lokasi Tujuan" autocomplete="off">
                    <ul class="saran-list" id="saranTujuan"></ul>
                </div>
            </div>
        </div>

        <div class="form-section">
            <p class="form-title">Isi detail drop off minyak Anda</p>

            <div class="form-group">
                <label for="jumlahLiter">Masukkan Jumlah Liter</label>
                <input type="number" id="jumlahLiter" class="input-control" min="5" placeholder="Minimal 5 liter">
            </div>

            <div class="form-group">
                <label for="tanggalAntar">Tanggal Pengantaran</label>
                <input type="date" id="tanggalAntar" class="input-control">
            </div>

            <div class="form-group">
                <label for="catatan">Catatan (opsional)</label>
                <input type="text" id="catatan" class="input-control" placeholder="Contoh: Titip di satpam">
            </div>

            <button class="btn-rute" onclick="keNavigasi()">RUTE</button>
        </div>
    </div>

    <script>
        // ============================================================
        // 0. CEK APAKAH SUDAH ADA PESANAN AKTIF SEBELUM TAMPILKAN FORM
        //    (mencegah form kosong tampil lagi setelah tombol back ditekan)
        // ============================================================
        (function cekPesananAktif() {
            const pesanan = localStorage.getItem('pesananDropOff');
            if (pesanan) {
                const data = JSON.parse(pesanan);
                if (data.status !== 'selesai' && data.status !== 'dibatalkan') {
                    window.location.href = 'titikDropOff.html';
                }
            }
        })();

        // ============================================================
        // 1. DETEKSI LOKASI USER SAAT INI (untuk bias pencarian + tombol GPS)
        // ============================================================
        let currentLat = null;
        let currentLon = null;

        // Simpan koordinat & alamat yang sudah dipilih, dipakai nanti untuk hitung rute
        const lokasiTerpilih = {
            penjemputan: { alamat: '', lat: null, lon: null },
            tujuan: { alamat: '', lat: null, lon: null }
        };

        // Minta lokasi user begitu halaman dibuka, dipakai untuk membiaskan hasil pencarian
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    currentLat = pos.coords.latitude;
                    currentLon = pos.coords.longitude;
                },
                () => {
                    console.warn('Izin lokasi ditolak atau gagal, pencarian tanpa bias area.');
                }
            );
        }

        // ============================================================
        // 2. REVERSE GEOCODING: tombol "gunakan lokasi saya" (📍)
        // ============================================================
        const btnGps = document.getElementById('btnGpsPenjemputan');
        const inputPenjemputan = document.getElementById('lokasiSaja');

        btnGps.addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert('Browser tidak mendukung fitur lokasi.');
                return;
            }
            btnGps.disabled = true;
            btnGps.textContent = '⏳';

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                currentLat = latitude;
                currentLon = longitude;

                try {
                    const res = await fetch(
                        `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json&addressdetails=1`
                    );
                    const data = await res.json();
                    inputPenjemputan.value = data.display_name || 'Lokasi tidak ditemukan';

                    lokasiTerpilih.penjemputan = {
                        alamat: data.display_name,
                        lat: latitude,
                        lon: longitude
                    };
                } catch (err) {
                    alert('Gagal mengambil nama alamat. Coba lagi.');
                } finally {
                    btnGps.disabled = false;
                    btnGps.textContent = '📍';
                }
            }, () => {
                alert('Gagal mendapatkan lokasi. Pastikan izin lokasi diaktifkan di browser.');
                btnGps.disabled = false;
                btnGps.textContent = '📍';
            });
        });

        // ============================================================
        // 3. AUTOCOMPLETE ALAMAT (Nominatim / OpenStreetMap)
        // ============================================================
        function debounce(fn, delay) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        }

        async function cariAlamat(query) {
            if (!query || query.trim().length < 3) return [];

            const viewboxParam = (currentLat && currentLon)
                ? `&viewbox=${currentLon - 0.3},${currentLat + 0.3},${currentLon + 0.3},${currentLat - 0.3}&bounded=0`
                : '';

            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}` +
                        `&format=json&addressdetails=1&limit=6&countrycodes=id${viewboxParam}`;

            const res = await fetch(url, {
                headers: { 'Accept-Language': 'id' }
            });
            return res.json();
        }

        function formatAlamat(item) {
            const addr = item.address || {};
            const namaUtama = addr.road || addr.pedestrian || addr.neighbourhood || item.name || item.display_name.split(',')[0];
            const kecamatan = addr.suburb || addr.village || addr.town || addr.city_district || '';
            const kota = addr.city || addr.county || addr.regency || '';
            const detail = [kecamatan, kota].filter(Boolean).join(', ');
            return { namaUtama, detail: detail || item.display_name };
        }

        function setupAutocomplete(inputId, listId, targetKey) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(listId);

            const jalankanPencarian = debounce(async (query) => {
                list.innerHTML = '<li class="status-msg">Mencari...</li>';
                list.classList.add('show');

                try {
                    const hasil = await cariAlamat(query);

                    if (!hasil.length) {
                        list.innerHTML = '<li class="status-msg">Alamat tidak ditemukan</li>';
                        return;
                    }

                    list.innerHTML = hasil.map((item, idx) => {
                        const { namaUtama, detail } = formatAlamat(item);
                        return `<li data-idx="${idx}">
                                    <strong>${namaUtama}</strong>
                                    <small>${detail}</small>
                                </li>`;
                    }).join('');

                    Array.from(list.children).forEach((li, idx) => {
                        li.addEventListener('click', () => {
                            const item = hasil[idx];
                            input.value = item.display_name;
                            lokasiTerpilih[targetKey] = {
                                alamat: item.display_name,
                                lat: parseFloat(item.lat),
                                lon: parseFloat(item.lon)
                            };
                            list.classList.remove('show');
                        });
                    });
                } catch (err) {
                    list.innerHTML = '<li class="status-msg">Gagal memuat, coba lagi</li>';
                }
            }, 350);

            input.addEventListener('input', () => {
                const query = input.value;
                lokasiTerpilih[targetKey] = { alamat: query, lat: null, lon: null };

                if (query.trim().length < 3) {
                    list.classList.remove('show');
                    return;
                }
                jalankanPencarian(query);
            });

            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !list.contains(e.target)) {
                    list.classList.remove('show');
                }
            });
        }

        setupAutocomplete('lokasiSaja', 'saranPenjemputan', 'penjemputan');
        setupAutocomplete('lokasiTujuan', 'saranTujuan', 'tujuan');

        // ============================================================
        // 4. VALIDASI, SIMPAN STATUS PESANAN, & NAVIGASI
        // ============================================================
        function keNavigasi() {
    // Mengubah nilai input menjadi angka desimal (float)
    const liter = parseFloat(document.getElementById('jumlahLiter').value);
    const tanggal = document.getElementById('tanggalAntar').value;
    const catatan = document.getElementById('catatan').value;

    // Validasi apakah input liter kosong, bukan angka, atau kurang dari sama dengan 0
    if (!liter || isNaN(liter) || liter <= 0) {
        alert('Harap masukkan jumlah liter yang valid (minimal 1 liter)!');
        return;
    }

    if (!tanggal) {
        alert('Harap isi tanggal pengantaran terlebih dahulu!');
        return;
    }

    if (!lokasiTerpilih.penjemputan.alamat || !lokasiTerpilih.tujuan.alamat) {
        alert('Harap pilih lokasi penjemputan dan tujuan terlebih dahulu!');
        return;
    }

    // Simpan status pesanan
    const dataPesanan = {
        status: 'siap_berangkat',
        liter: liter, // Sekarang bertipe angka (misal: 3 atau 5.5)
        tanggal, catatan,
        penjemputan: lokasiTerpilih.penjemputan,
        tujuan: lokasiTerpilih.tujuan,
        waktuPesan: Date.now()
    };
    localStorage.setItem('pesananDropOff', JSON.stringify(dataPesanan));

    window.location.href = 'titikDropOff.html';
}
    </script>
</body>
</html>
