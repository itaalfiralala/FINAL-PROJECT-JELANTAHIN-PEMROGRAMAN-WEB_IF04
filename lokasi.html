<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigasi Kurir - JelantahIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0d1b2a;
            color: white;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            height: 100vh;
            flex-direction: row;
        }

        /* --- KIRI PETA --- */
        .map-side {
            flex: 1.5;
            position: relative;
            overflow: hidden;
        }

        .map-image-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .rute-line {
            position: absolute;
            top: 40%;
            left: 20%;
            width: 60%;
            height: 4px;
            background: #007bff;
            transform: rotate(-15deg);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
            z-index: 2;
        }

        .kurir-moving {
            position: absolute;
            top: 38%; 
            left: 35%; 
            font-size: 40px;
            z-index: 5;
            transform: rotate(-18deg);
        }

        .pin-dest {
            position: absolute;
            top: 25%;
            right: 22%;
            font-size: 30px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            z-index: 5;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            text-decoration: none;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* --- SISI KANAN: PANEL INFORMASI --- */
        .info-side {
            flex: 1;
            background-color: #0b1622;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            z-index: 20;
        }

        h2 { font-size: 2rem; margin-bottom: 10px; }
        .estimasi { color: #a0a0a0; margin-bottom: 30px; }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            background: #162639;
            padding: 15px 25px;
            border-radius: 15px;
        }

        .stat-item { font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .icon-yellow { color: #ffb703; font-weight: bold; }

        .pemandangan-box {
            margin-bottom: 40px;
            position: relative;
        }

        .btn-start {
            background: #ffb703;
            color: #0b1622;
            border: none;
            padding: 20px 60px;
            width: 100%;
            max-width: 350px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* UNTUK HP */
        @media (max-width: 992px) {
            .main-wrapper { flex-direction: column; }
            .map-side { flex: 1; min-height: 350px; }
            .info-side { 
                flex: 1.2; 
                border-radius: 30px 30px 0 0; 
                margin-top: -30px; 
                padding: 30px 20px;
            }
            .kurir-moving { font-size: 30px; top: 38%; left: 40%; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="map-side">
            <img src="images/peta.png" alt="Peta Navigasi" class="map-image-bg">

            <a href="#" class="back-btn">&#10094;</a>
            
            <div class="kurir-moving">🛵</div>
            <div class="pin-dest">📍</div>
        </div>

        <div class="info-side">

            <h2>Antar ke Titik Drop Off</h2>
            <p class="estimasi">Estimasi Jarak : 1.2km (15min)</p>

            <div class="stats-container">
                <div class="stat-item">
                    <span class="icon-yellow">$</span> +50 Poin
                </div>
                <div class="stat-item">
                    <span class="icon-yellow">🕒</span> 08:00 - 18:00
                </div>
            </div>

            <div class="pemandangan-box">
                <div style="font-size: 70px; margin-bottom: 10px;">
                    🌳 🛵 🌳
                </div>
                <div style="width: 200px; height: 3px; background: white; margin: 0 auto;"></div>
            </div>

            <button class="btn-start">Mulai Navigasi</button>
        </div>
    </div>

</body>
</html>
