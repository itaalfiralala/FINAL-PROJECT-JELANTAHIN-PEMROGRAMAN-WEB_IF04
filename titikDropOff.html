<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Drop Off - JelantahIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: #112039;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .logo { font-size: 1.4rem; font-weight: bold; color: #ffb703; }

        .map-placeholder {
            flex: 1;
            min-height: 220px;
            background: #1c2f4d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
            text-align: center;
        }

        .judul-halaman {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 8px;
            position: relative;
            z-index: 2;
        }

        .estimasi-jarak {
            color: #b8c4d9;
            font-size: 0.95rem;
            margin-bottom: 18px;
            position: relative;
            z-index: 2;
        }

        /* garis jalan putih putus-putus sebagai dekorasi CSS (tanpa perlu file gambar) */
        .garis-jalan {
            width: 100%;
            max-width: 320px;
            height: 3px;
            margin-top: 14px;
            background: repeating-linear-gradient(
                to right,
                white 0px, white 20px,
                transparent 20px, transparent 40px
            );
            opacity: 0.6;
            position: relative;
            z-index: 2;
        }

        
        .kurir-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .kurir-icon { font-size: 2.6rem; }
        .pohon-icon { font-size: 2rem; opacity: 0.85; }

        .btn-navigasi, .btn-tiba {
            width: calc(100% - 50px);
            max-width: 380px;
            margin: 20px auto 0;
            padding: 16px;
            background: #ffb703;
            color: #112039;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: transform 0.15s ease, box-shadow 0.3s ease;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 8px 2px rgba(255, 183, 3, 0.4); }
            50% { box-shadow: 0 0 20px 6px rgba(255, 183, 3, 0.8); }
        }

        .btn-navigasi:hover, .btn-tiba:hover { background: #e0a102; transform: scale(1.02); box-shadow: 0 0 12px 4px rgba(255, 183, 3, 0.6); }
        .btn-navigasi:active, .btn-tiba:active { transform: scale(0.95); animation: none; }

        .status-card {
            background: white;
            color: #112039;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 30px 25px 40px;
        }


        .dot-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffb703;
            animation: pulseDot 1.2s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .status-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 6px; }
        .status-desc { color: #666; font-size: 0.9rem; margin-bottom: 25px; }

        /* kartu poin yang muncul saat pesanan selesai */
        .poin-card {
            display: none;
            background: linear-gradient(135deg, #ffb703, #ffd166);
            color: #6b4500;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 25px;
            align-items: center;
            gap: 12px;
        }
        .poin-card.show { display: flex; }
        .poin-icon { font-size: 2rem; }
        .poin-text-utama { font-weight: bold; font-size: 1.05rem; }
        .poin-text-sub { font-size: 0.8rem; opacity: 0.85; }

        .detail-row {
            display: flex;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid #eee;
        }

        .detail-row:last-of-type { border-bottom: none; }

        .detail-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }

        .detail-label { font-size: 0.75rem; color: #999; margin-bottom: 2px; }
        .detail-value { font-size: 0.9rem; font-weight: 600; }

        .btn-batal {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            border: 2px solid #d9534f;
            background: white;
            color: #d9534f;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-batal:hover { background: #fdf1f0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">JeLantahIN</div>
        <div style="cursor:pointer;" onclick="window.location.href='index.html'">🏠</div>
    </div>

    <div class="map-placeholder">
        <div class="judul-halaman">Antar ke Titik Drop Off</div>
        <div class="estimasi-jarak" id="estimasiJarak">Estimasi Jarak : - </div>

        <div class="kurir-wrapper" id="kurirWrapper">
            <span class="pohon-icon">🌳</span>
            <span class="kurir-icon">🛵</span>
            <span class="pohon-icon">🌳</span>
        </div>
        <div class="garis-jalan"></div>

        <button class="btn-navigasi" id="btnNavigasi" onclick="mulaiNavigasi()">Mulai Navigasi</button>
        <button class="btn-tiba" id="btnTiba" onclick="konfirmasiTiba()" style="display:none;">Saya Sudah Tiba di Lokasi</button>
    </div>

    <div class="status-card">
        <div class="status-badge">
            <span class="dot-pulse"></span>
            <span id="statusBadgeText">Rute Siap</span>
        </div>

        <div class="status-title" id="statusTitle">Rute Anda sudah siap</div>
        <div class="status-desc" id="statusDesc">Tekan "Mulai Navigasi" untuk menuju titik drop off.</div>

        <div class="poin-card" id="poinCard">
            <span class="poin-icon">🎉</span>
            <div>
                <div class="poin-text-utama" id="poinDidapat">+50 Poin didapatkan!</div>
                <div class="poin-text-sub" id="poinTotal">Total poin Anda: 0</div>
            </div>
        </div>

        <div class="detail-row">
            <span class="detail-icon">🟡</span>
            <div>
                <div class="detail-label">Lokasi Anda</div>
                <div class="detail-value" id="alamatPenjemputan">-</div>
            </div>
        </div>
        <div class="detail-row">
            <span class="detail-icon">📍</span>
            <div>
                <div class="detail-label">Titik Drop Off Tujuan</div>
                <div class="detail-value" id="alamatTujuan">-</div>
            </div>
        </div>
        <div class="detail-row">
            <span class="detail-icon">🛢️</span>
            <div>
                <div class="detail-label">Jumlah Liter</div>
                <div class="detail-value" id="jumlahLiterTampil">-</div>
            </div>
        </div>
        <div class="detail-row">
            <span class="detail-icon">📅</span>
            <div>
                <div class="detail-label">Tanggal Pengantaran</div>
                <div class="detail-value" id="tanggalTampil">-</div>
            </div>
        </div>

        <button class="btn-batal" id="btnBatal" onclick="batalkanPesanan()">Batalkan Pesanan</button>
    </div>

    <script>
        const KEY_PESANAN = 'pesananDropOff';
        const KEY_TOTAL_POIN = 'totalPoinJelantahIN';
        const POIN_PER_SETOR = 50; // poin didapat setiap kali menyetorkan minyak

        // ============================================================
        // Karena Drop Off = user yang mengantar sendiri (bukan menunggu kurir),
        // perubahan status di sini dikontrol oleh AKSI USER (klik tombol),
        // bukan oleh timer otomatis seperti pada flow Pickup.
        // ============================================================
        const URUTAN_STATUS = [
            { key: 'siap_berangkat', badge: 'Rute Siap', title: 'Rute Anda sudah siap', desc: 'Tekan "Mulai Navigasi" untuk menuju titik drop off.' },
            { key: 'menuju_lokasi', badge: 'Sedang Menuju Lokasi', title: 'Anda sedang menuju titik drop off', desc: 'Ikuti navigasi hingga tiba di lokasi tujuan.' },
            { key: 'selesai', badge: 'Selesai', title: 'Drop off berhasil, terima kasih!', desc: 'Minyak Anda sudah diserahkan ke titik pengumpulan.' }
        ];

        // ------------------------------------------------------------
        // Hitung jarak lurus antar koordinat (rumus Haversine) + estimasi
        // waktu tempuh kasar (asumsi kecepatan rata-rata 20 km/jam di kota).
        // Ini estimasi kasar, bukan jarak rute jalan sesungguhnya.
        // ------------------------------------------------------------
        function hitungJarakKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) ** 2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function tampilkanEstimasi(pesanan) {
            const p = pesanan.penjemputan;
            const t = pesanan.tujuan;
            const elJarak = document.getElementById('estimasiJarak');

            if (p?.lat && p?.lon && t?.lat && t?.lon) {
                const jarakKm = hitungJarakKm(p.lat, p.lon, t.lat, t.lon);
                const menit = Math.max(1, Math.round((jarakKm / 20) * 60));
                elJarak.textContent = `Estimasi Jarak : ${jarakKm.toFixed(1)}km (${menit}min)`;
            } else {
                elJarak.textContent = 'Estimasi jarak tidak tersedia';
            }
        }

        // ------------------------------------------------------------
        // Klik "Mulai Navigasi": buka Google Maps DAN ubah status jadi
        // "menuju_lokasi", karena user sendiri yang mulai berkendara.
        // ------------------------------------------------------------
        function mulaiNavigasi() {
            const pesanan = muatDataMentah();
            if (!pesanan) return;
            const t = pesanan.tujuan;

            if (t?.lat && t?.lon) {
                window.open(`https://www.google.com/maps/dir/?api=1&destination=${t.lat},${t.lon}`, '_blank');
            } else {
                alert('Koordinat lokasi tujuan tidak tersedia.');
            }

            if (pesanan.status === 'siap_berangkat') {
                pesanan.status = 'menuju_lokasi';
                localStorage.setItem(KEY_PESANAN, JSON.stringify(pesanan));
                tampilkanData(pesanan);
            }
        }

        // ------------------------------------------------------------
        // Klik "Saya Sudah Tiba di Lokasi": user mengonfirmasi sendiri
        // bahwa dia sudah sampai (tidak ada kurir yang mengonfirmasi otomatis).
        // ------------------------------------------------------------
        function konfirmasiTiba() {
            const pesanan = muatDataMentah();
            if (!pesanan) return;

            pesanan.status = 'selesai';
            localStorage.setItem(KEY_PESANAN, JSON.stringify(pesanan));
            tampilkanData(pesanan);
        }

        // ------------------------------------------------------------
        // Sistem poin: ditambahkan sekali saja saat status jadi "selesai"
        // ------------------------------------------------------------
        function berikanPoinJikaSelesai(pesanan) {
    if (pesanan.status !== 'selesai') return;

    // Logika baru: 1 Liter = 10 Poin
    const POIN_PER_LITER = 10; 
    const jumlahLiter = parseFloat(pesanan.liter) || 0;
    const totalPoinDidapat = Math.round(jumlahLiter * POIN_PER_LITER); // Pembulatan angka jika desimal

    if (!pesanan.poinSudahDiberikan) {
        let totalPoin = parseInt(localStorage.getItem(KEY_TOTAL_POIN) || '0', 10);
        totalPoin += totalPoinDidapat;
        localStorage.setItem(KEY_TOTAL_POIN, totalPoin);

        pesanan.poinSudahDiberikan = true;
        localStorage.setItem(KEY_PESANAN, JSON.stringify(pesanan));

        document.getElementById('poinDidapat').textContent = `+${totalPoinDidapat} Poin didapatkan!`;
        document.getElementById('poinTotal').textContent = `Total poin Anda: ${totalPoin}`;
    } else {
        const totalPoin = parseInt(localStorage.getItem(KEY_TOTAL_POIN) || '0', 10);
        document.getElementById('poinDidapat').textContent = `+${totalPoinDidapat} Poin didapatkan!`;
        document.getElementById('poinTotal').textContent = `Total poin Anda: ${totalPoin}`;
    }
    document.getElementById('poinCard').classList.add('show');
}

        function muatDataMentah() {
            const raw = localStorage.getItem(KEY_PESANAN);
            return raw ? JSON.parse(raw) : null;
        }

        function muatData() {
            const pesanan = muatDataMentah();
            if (!pesanan) {
                window.location.href = 'dropOff.html';
                return null;
            }
            // pesanan lama (dari versi sebelumnya) mungkin masih pakai status "menunggu_kurir"
            // dari flow pickup; normalkan supaya tetap muncul sebagai "siap_berangkat"
            if (!URUTAN_STATUS.some(s => s.key === pesanan.status)) {
                pesanan.status = 'siap_berangkat';
            }
            return pesanan;
        }

        function tampilkanData(pesanan) {
            const infoStatus = URUTAN_STATUS.find(s => s.key === pesanan.status) || URUTAN_STATUS[0];

            document.getElementById('statusBadgeText').textContent = infoStatus.badge;
            document.getElementById('statusTitle').textContent = infoStatus.title;
            document.getElementById('statusDesc').textContent = infoStatus.desc;

            document.getElementById('alamatPenjemputan').textContent = pesanan.penjemputan?.alamat || '-';
            document.getElementById('alamatTujuan').textContent = pesanan.tujuan?.alamat || '-';
            document.getElementById('jumlahLiterTampil').textContent = pesanan.liter || '-';
            document.getElementById('tanggalTampil').textContent = pesanan.tanggal || '-';

            tampilkanEstimasi(pesanan);
            berikanPoinJikaSelesai(pesanan);

            const kurirWrapper = document.getElementById('kurirWrapper');
            const btnNavigasi = document.getElementById('btnNavigasi');
            const btnTiba = document.getElementById('btnTiba');
            const btnBatal = document.getElementById('btnBatal');

            if (pesanan.status === 'siap_berangkat') {
                kurirWrapper.classList.remove('bergerak');
                btnNavigasi.style.display = 'block';
                btnTiba.style.display = 'none';
                btnBatal.style.display = 'block';
            } else if (pesanan.status === 'menuju_lokasi') {
                kurirWrapper.classList.add('bergerak');
                btnNavigasi.style.display = 'none';
                btnTiba.style.display = 'block';
                btnBatal.style.display = 'block';
            } else if (pesanan.status === 'selesai') {
                kurirWrapper.classList.remove('bergerak');
                btnNavigasi.style.display = 'none';
                btnTiba.style.display = 'none';
                btnBatal.style.display = 'none';
            }
        }

        function batalkanPesanan() {
            if (confirm('Yakin ingin membatalkan pesanan ini?')) {
                localStorage.removeItem(KEY_PESANAN);
                window.location.href = 'dropOff.html';
            }
        }

        const pesananSaatIni = muatData();
        if (pesananSaatIni) {
            tampilkanData(pesananSaatIni);
        }
    </script>
</body>
</html>
