<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigasi Drop Off - JelantahIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0d1b2a;
            color: white;
            overflow: auto;
            min-height: 100vh;
        }

        .main-wrapper {
            display: flex;
            height: 100vh;
            flex-direction: row;
        }

        .map-side {
            flex: 1.5;
            position: relative;
            overflow: hidden;
        }

        .map-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .garis-jalan {
            position: absolute;
            top: 45%;
            left: 25%;
            width: 50%;
            height: 6px;
            background: #007bff;
            transform: rotate(0deg);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.8);
            z-index: 2;
        }

        .pin-dest {
            position: absolute;
            top: 35%;
            left: 25%;
            font-size: 35px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            z-index: 3;
        }

        .kurir {
            position: absolute;
            top: 35%;
            right: 25%;
            font-size: 40px;
            z-index: 5;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            text-decoration: none;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #e0e0e0;
        }

        .info-side {
            flex: 1;
            background-color: #0b1622;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            z-index: 20;
        }

        h2 { font-size: 2rem; margin-bottom: 10px; }
        .estimation { color: #a0a0a0; margin-bottom: 30px; }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            background: #162639;
            padding: 15px 25px;
            border-radius: 15px;
        }

        .stat-item { font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .icon-yellow { color: #ffb703; font-weight: bold; }

        .illustration-box {
            margin-bottom: 40px;
            position: relative;
        }

        .btn-start {
            background: #ffb703;
            color: #0b1622;
            border: none;
            padding: 20px 60px;
            width: 100%;
            max-width: 350px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start:hover {
            background: #e0a102;
        }

        /* tampilan HP */
        @media (max-width: 992px) {
            .main-wrapper { flex-direction: column; }
            .map-side { flex: 1; min-height: 350px; }
            .info-side { 
                flex: 1.2; 
                border-radius: 30px 30px 0 0; 
                margin-top: -30px; 
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="map-side">
            <a href="dropOff.html" class="back-btn">&#10094;</a>
            
            <img src="./images/peta.png" alt="Peta" class="map-img">

            <div class="garis-jalan"></div>
            
            <div class="kurir">🛵</div>
            
            <div class="pin-dest">📍</div>
        </div>

        <div class="info-side">
            <h2>Antar ke Titik Drop Off</h2>
            <p class="estimation">Estimasi Jarak : 1.2km (15min)</p>

            <div class="stats-container">
                <div class="stat-item">
                    <span class="icon-yellow">🪙</span> +50 Poin
                </div>
                <div class="stat-item">
                    <span class="icon-yellow">🕒</span> 08:00 - 18:00
                </div>
            </div>

            <div class="illustration-box">
                <div style="font-size: 70px; margin-bottom: 10px;">
                    🌳 🛵 🌳
                </div>
                <div style="width: 200px; height: 3px; background: white; margin: 0 auto;"></div>
            </div>

            <!-- navigasi -->
            <button class="btn-start" onclick="mulaiSimulasi()">Mulai Navigasi</button>
        </div>
    </div>

    <script>
        function mulaiSimulasi() {
            alert("Sistem GPS Aktif! Silakan ikuti jalur biru pada peta untuk menuju ke lokasi pengepul JelantahIN. 🗺️");
        }
    </script>
</body>
</html>
